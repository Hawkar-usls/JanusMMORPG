<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#08070c" />
  <title>Initium Chronicles | Janus Genesis</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --paper: rgba(18, 16, 25, .92);
      --ink: #efe7d7;
      --muted: #a99d8f;
      --amber: #d6a84d;
      --violet: #7b63b7;
      --line: rgba(214, 168, 77, .24);
      --serif: Georgia, "Times New Roman", serif;
      --mono: "Cascadia Mono", Consolas, monospace;
      --ui: Verdana, Geneva, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: var(--ui);
      background:
        radial-gradient(circle at 18% 12%, rgba(123,99,183,.24), transparent 32vw),
        radial-gradient(circle at 82% 18%, rgba(214,168,77,.18), transparent 30vw),
        linear-gradient(145deg, #050509, #11101a 58%, #07060b);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      opacity: .16;
      pointer-events: none;
      background-image:
        linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(circle at 50% 45%, black 0 42%, transparent 78%);
    }
    .book {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 30px;
      background: var(--paper);
      box-shadow: 0 28px 90px rgba(0,0,0,.55);
      padding: clamp(22px, 6vw, 44px);
      position: relative;
      overflow: hidden;
    }
    .book::after {
      content: "";
      position: absolute;
      inset: auto -20% -45% 20%;
      height: 260px;
      background: radial-gradient(circle, rgba(214,168,77,.17), transparent 65%);
      pointer-events: none;
    }
    .seal {
      width: 64px;
      height: 64px;
      border: 1px solid var(--line);
      border-radius: 22px;
      display: grid;
      place-items: center;
      color: var(--amber);
      font: 900 34px/1 var(--serif);
      background: linear-gradient(135deg, rgba(123,99,183,.58), rgba(39,34,52,.82));
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font: 900 clamp(34px, 8vw, 64px)/.92 var(--serif);
      letter-spacing: -.055em;
    }
    .sub {
      margin: 16px 0 24px;
      max-width: 620px;
      color: var(--muted);
      font: 15px/1.65 var(--mono);
    }
    .status {
      color: var(--amber);
      font: 14px/1.55 var(--mono);
      min-height: 44px;
      margin: 14px 0 18px;
    }
    .manual { display: none; margin-top: 16px; }
    .panel { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
    label { display: block; margin-bottom: 7px; color: var(--muted); font-size: 12px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 15px;
      padding: 14px 15px;
      background: rgba(0,0,0,.24);
      color: var(--ink);
      outline: none;
      font: 16px/1.2 var(--mono);
    }
    button, a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      border: 0;
      border-radius: 16px;
      padding: 14px 18px;
      color: #160f07;
      background: linear-gradient(135deg, #f2d28d, #d6a84d);
      font-weight: 900;
      text-decoration: none;
      cursor: pointer;
    }
    .buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .ghost { color: var(--ink) !important; background: rgba(255,255,255,.06) !important; border: 1px solid var(--line) !important; }
    .note { color: var(--muted); font: 12px/1.65 var(--mono); }
    @media (max-width: 720px) {
      .panel { grid-template-columns: 1fr; }
      .buttons { display: grid; }
      button, a.button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="book">
    <div class="seal">J</div>
    <h1>Initium Chronicles</h1>
    <p class="sub">Живой Хроникон открывается через Telegram. Если ты пришёл из бота, дверь узнает тебя сама.</p>
    <div class="status" id="status">Печать Януса проверяет Telegram ID...</div>

    <section class="manual" id="manualLogin">
      <p class="note">Telegram не передал данные WebApp. Можно войти вручную для dev-mode.</p>
      <div class="panel">
        <div>
          <label for="userId">Telegram ID игрока</label>
          <input id="userId" inputmode="numeric" autocomplete="off" placeholder="123456789" />
        </div>
        <div>
          <label for="name">Имя в хронике</label>
          <input id="name" autocomplete="off" placeholder="Странник" />
        </div>
      </div>
      <div class="buttons">
        <button id="openGame">Открыть Живой Хроникон</button>
        <a class="button ghost" href="https://t.me/Ini_Chron_bot" target="_blank" rel="noopener">Telegram бот игры</a>
      </div>
    </section>
  </main>

  <script>
    const NAS_GAME_URL = "http://192.168.1.92:8791/";
    const params = new URLSearchParams(location.search);
    const userId = document.getElementById("userId");
    const nameInput = document.getElementById("name");
    const statusBox = document.getElementById("status");
    const manualLogin = document.getElementById("manualLogin");

    function playerName(user) {
      return [user.first_name, user.last_name].filter(Boolean).join(" ") || user.username || "Странник";
    }

    function targetUrl(id, name) {
      const target = new URL(NAS_GAME_URL);
      target.searchParams.set("user_id", String(id));
      if (name) target.searchParams.set("name", name);
      target.searchParams.set("from", "telegram_webapp");
      return target.toString();
    }

    function openGame(id, name) {
      const finalId = String(id || userId.value || "").trim();
      const finalName = String(name || nameInput.value || "").trim();
      if (!finalId) {
        statusBox.textContent = "Нужен Telegram ID. Без ключа хроника делает вид, что дверь философская.";
        manualLogin.style.display = "block";
        userId.focus();
        return;
      }
      localStorage.setItem("initium_user_id", finalId);
      localStorage.setItem("initium_name", finalName);
      statusBox.textContent = "Игрок опознан. Открываю Живой Хроникон...";
      location.replace(targetUrl(finalId, finalName));
    }

    function telegramUser() {
      const tg = window.Telegram?.WebApp;
      if (!tg) return null;
      try { tg.ready(); tg.expand(); } catch (_) {}
      return tg.initDataUnsafe?.user || null;
    }

    function boot() {
      const tgUser = telegramUser();
      if (tgUser?.id) {
        openGame(tgUser.id, playerName(tgUser));
        return;
      }

      const queryId = params.get("user_id");
      const queryName = params.get("name");
      const savedId = queryId || localStorage.getItem("initium_user_id") || "";
      const savedName = queryName || localStorage.getItem("initium_name") || "";
      userId.value = savedId;
      nameInput.value = savedName;
      if ((params.get("autostart") === "1" || queryId) && savedId) {
        openGame(savedId, savedName);
        return;
      }
      statusBox.textContent = "Telegram WebApp ID не пришёл. Открыт ручной вход.";
      manualLogin.style.display = "block";
    }

    document.getElementById("openGame").addEventListener("click", () => openGame());
    document.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) openGame();
    });
    boot();
  </script>
</body>
</html>
